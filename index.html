<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sachin Sharma | DSA Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=DM+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <h1>🚀 Sachin Sharma</h1>
  <p>DSA → System Design → FAANG</p>
</header>

<section class="stats">

  <div class="card">
    <h3>📦 Arrays</h3>
    <div class="counter" id="arrays-count">0</div>
    <div class="bar"><div id="arrays-bar"></div></div>
  </div>

  <div class="card">
    <h3>🌳 Trees</h3>
    <div class="counter" id="trees-count">0</div>
    <div class="bar"><div id="trees-bar"></div></div>
  </div>

  <div class="card">
    <h3>🕸 Graphs</h3>
    <div class="counter" id="graphs-count">0</div>
    <div class="bar"><div id="graphs-bar"></div></div>
  </div>

</section>

<section class="github">
  ⭐ GitHub Repos: <span id="repoCount">Loading...</span>
</section>

<section class="actions">
  <button onclick="copyText()">Copy Portfolio Info</button>
</section>

<footer>
  Built by Sachin Sharma ⚡ | FAANG Preparation Journey
</footer>

<script src="js/script.js"></script>
</body>
</html>
